<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slazzer VIP BG Remover</title>
    <style>
        :root { --accent: #8b5cf6; --bg-dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-bottom: 5px; }
        .upload-box { border: 2px dashed #475569; padding: 2rem; border-radius: 1rem; margin: 1.5rem 0; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-box:hover { border-color: var(--accent); background: #1e293b; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        button { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 0.7rem; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #475569; opacity: 0.6; }
        #loader { display: none; margin: 1rem 0; color: var(--accent); font-weight: bold; }
        #result-img { max-width: 100%; margin-top: 1.5rem; border-radius: 0.8rem; display: none; border: 1px solid #334155; }
        .download-btn { display: none; margin-top: 1rem; background: #10b981; color: white; text-decoration: none; padding: 12px; border-radius: 0.7rem; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>Slazzer AI Remover</h2>
    <p style="font-size: 0.8rem; color: #94a3b8;">Fast & Clean Background Removal</p>
    
    <div class="upload-box">
        <span id="file-info">Select Image 🖼️</span>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="processBtn">REMOVE BACKGROUND</button>
    
    <div id="loader">Processing... 🚀</div>
    
    <img id="result-img" alt="Result">
    <a id="downloadBtn" class="download-btn" style="display: none;">DOWNLOAD PNG</a>
</div>

<script>
    // Aapki Slazzer API Key
    const API_KEY = "66f2155bb50a45fb94697586cdd4be44"; 

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loader = document.getElementById('loader');
    const resultImg = document.getElementById('result-img');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileInfo = document.getElementById('file-info');

    fileInput.onchange = () => {
        if(fileInput.files[0]) fileInfo.innerText = fileInput.files[0].name;
    };

    processBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Pehle photo select karein!");

        loader.style.display = "block";
        processBtn.disabled = true;
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        const formData = new FormData();
        formData.append("source_image_file", file);

        try {
            // Slazzer API endpoint
            const response = await fetch("https://api.slazzer.com/v2.0/remove_background", {
                method: "POST",
                headers: { "API-KEY": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultImg.src = url;
                resultImg.style.display = "block";
                
                downloadBtn.href = url;
                downloadBtn.download = "slazzer_no_bg.png";
                downloadBtn.style.display = "block";
                downloadBtn.innerText = "Download Result ✅";
            } else {
                const errData = await response.json();
                alert("API Error: " + (errData.message || "Failed to process"));
            }
        } catch (error) {
            alert("Network Error! Check your connection or GitHub Pages deployment.");
        } finally {
            loader.style.display = "none";
            processBtn.disabled = false;
        }
    };
</script>

</body>
</html>
