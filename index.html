<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision BG Remover</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .upload-area { border: 2px dashed #444; padding: 30px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        #btn { background: #3d5afe; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #loader { display: none; margin: 15px 0; color: #3d5afe; font-weight: bold; }
        #resultImg { width: 100%; border-radius: 10px; display: none; margin-top: 20px; border: 1px solid #444; background: #222; }
        .download { display: none; margin-top: 15px; color: #00ff88; text-decoration: none; font-weight: bold; border: 1px solid #00ff88; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #3d5afe;">AI Vision Remover</h2>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span id="label">Select Image</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button id="btn">REMOVE BACKGROUND</button>
    <div id="loader">Processing Image... 🤖</div>

    <img id="resultImg">
    <a id="downloadBtn" class="download">DOWNLOAD CLEAN PNG</a>
</div>

<script>
    // ✅ Tere screenshot se details:
    const CLOUD_NAME = "dunkfdbd9"; 
    const UPLOAD_PRESET = "my_preset"; // Jo preset tune 'Unsigned' banaya hai

    const fileInput = document.getElementById('fileInput');
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('label').innerText = fileInput.files[0].name; };

    btn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Select photo!");

        loader.style.display = "block";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        try {
            // 1. Upload to Cloudinary
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            
            if (data.public_id) {
                // 2. AI Background Removal URL
                // Note: v${data.version} use karna zaruri hai
                const cleanUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/e_background_removal/v${data.version}/${data.public_id}.png`;

                // Image load check
                const img = new Image();
                img.src = cleanUrl;
                img.onload = () => {
                    resultImg.src = cleanUrl;
                    resultImg.style.display = "block";
                    downloadBtn.href = cleanUrl;
                    downloadBtn.style.display = "inline-block";
                    loader.style.display = "none";
                    btn.disabled = false;
                };
            } else {
                alert("Upload Error! Settings mein 'Unsigned Preset' check karein.");
            }
        } catch (err) {
            alert("Network Error!");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
