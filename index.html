<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixian AI BG Remover</title>
    <style>
        :root { --accent: #00ff88; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h2 { margin-top: 0; color: var(--accent); }
        .upload-box { border: 2px dashed #444; padding: 2rem; border-radius: 1rem; margin: 1.5rem 0; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-box:hover { border-color: var(--accent); background: #252525; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        button { background: var(--accent); color: black; border: none; padding: 12px; width: 100%; border-radius: 0.5rem; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #444; color: #888; }
        #loader { display: none; margin: 1rem 0; color: var(--accent); font-weight: bold; }
        #result-img { max-width: 100%; margin-top: 1.5rem; border-radius: 0.5rem; display: none; border: 1px solid #444; background: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        .download-btn { display: none; margin-top: 1rem; color: var(--accent); text-decoration: none; font-weight: bold; border: 1px solid var(--accent); padding: 8px; border-radius: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>Pixian AI Remover</h2>
    <p style="font-size: 0.8rem; color: #aaa;">Free Testing Mode Enabled (Watermarked)</p>
    
    <div class="upload-box">
        <span id="file-name">Choose an Image</span>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="processBtn">Remove Background</button>
    
    <div id="loader">AI is processing... 🚀</div>
    
    <img id="result-img" alt="Result">
    <a id="downloadBtn" class="download-btn" style="display: none;">Download PNG</a>
</div>

<script>
    // Pixian API Credentials (from your doc)
    const API_ID = "pxqcc9m9wdvtr8k";
    const API_SECRET = "6upcvf9no0slbdomqcl5fk3dmfslcs5c9ds33k0b96ighrpgmno2";

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loader = document.getElementById('loader');
    const resultImg = document.getElementById('result-img');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileNameDisplay = document.getElementById('file-name');

    fileInput.onchange = () => {
        if(fileInput.files[0]) fileNameDisplay.innerText = fileInput.files[0].name;
    };

    processBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Please select a file!");

        // UI Reset
        loader.style.display = "block";
        processBtn.disabled = true;
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        const formData = new FormData();
        formData.append("image", file);
        formData.append("test", "true"); // 'true' means unlimited free testing

        try {
            // Basic Auth Header create karna (btoa for base64 encoding)
            const auth = btoa(`${API_ID}:${API_SECRET}`);

            const response = await fetch("https://api.pixian.ai/api/v2/remove-background", {
                method: "POST",
                headers: {
                    "Authorization": `Basic ${auth}`
                },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultImg.src = url;
                resultImg.style.display = "block";
                
                downloadBtn.href = url;
                downloadBtn.download = "pixian_no_bg.png";
                downloadBtn.style.display = "block";
                downloadBtn.innerText = "Download Result";
            } else {
                const errData = await response.json();
                alert("Error: " + errData.error.message);
            }
        } catch (error) {
            console.error(error);
            alert("Network Error! GitHub Pages par try karein.");
        } finally {
            loader.style.display = "none";
            processBtn.disabled = false;
        }
    };
</script>

</body>
</html>
