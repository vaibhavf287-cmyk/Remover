<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Remover</title>
    <style>
        :root { --accent: #4f46e5; --bg: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 40px auto; background: #161616; padding: 30px; border-radius: 24px; border: 1px solid #262626; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .upload-area { border: 2px dashed #333; padding: 40px; border-radius: 18px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .upload-area:hover { border-color: var(--accent); background: #1a1a1a; }
        #btn { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        #btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }
        #loader { display: none; margin: 20px 0; color: var(--accent); font-weight: bold; }
        #resultImg { width: 100%; border-radius: 12px; display: none; margin-top: 20px; border: 1px solid #333; background: #000; }
        .download { display: none; margin-top: 15px; color: #00ff88; text-decoration: none; font-weight: bold; border: 1px solid #00ff88; padding: 12px; border-radius: 10px; display: block; transition: 0.3s; }
        .download:hover { background: rgba(0, 255, 136, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: white; margin-bottom: 5px;">AI Vision Remover</h2>
    <p style="font-size: 12px; color: #666; margin-bottom: 20px;">No Watermark • HD Output</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span id="label">Click to select photo</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button id="btn">REMOVE BACKGROUND</button>
    <div id="loader">Neural AI is processing... 🧠✨</div>

    <img id="resultImg" alt="Result">
    <a id="downloadBtn" class="download" target="_blank">DOWNLOAD CLEAN PNG</a>
</div>

<script>
    // ✅ Tere Screenshot se data
    const CLOUD_NAME = "dunkfdbd9"; 
    const UPLOAD_PRESET = "my_preset"; 

    const fileInput = document.getElementById('fileInput');
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('label').innerText = fileInput.files[0].name; };

    btn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Bhai, photo toh select kar!");

        loader.style.display = "block";
        btn.disabled = true;
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        try {
            // 1. Photo Upload
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            
            if (data.public_id) {
                // 2. Build AI Removal URL
                const cleanUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/e_background_removal/v${data.version}/${data.public_id}.png`;

                // 3. Auto-Retry check (jab tak AI process na kar le)
                const checkImage = () => {
                    const testImg = new Image();
                    testImg.src = cleanUrl;
                    testImg.onload = () => {
                        resultImg.src = cleanUrl;
                        resultImg.style.display = "block";
                        downloadBtn.href = cleanUrl;
                        downloadBtn.style.display = "block";
                        loader.style.display = "none";
                        btn.disabled = false;
                    };
                    testImg.onerror = () => {
                        // AI process kar raha hai, 2 second baad firse check karo
                        setTimeout(checkImage, 2000);
                    };
                };
                checkImage();
            } else {
                alert("Upload failed! Settings mein 'my_preset' unsigned hai na?");
                loader.style.display = "none";
                btn.disabled = false;
            }
        } catch (err) {
            alert("Network fail!");
            loader.style.display = "none";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
