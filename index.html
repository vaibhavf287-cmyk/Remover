<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Image Editor</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 800px; text-align: center; }
        .canvas-area { margin: 20px 0; border: 2px dashed #cbd5e1; border-radius: 10px; overflow: hidden; position: relative; }
        canvas { max-width: 100%; height: auto; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        .btn-bg { background: #ef4444; } /* Red for BG Remove */
        input[type="range"] { width: 100%; }
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Image Editor Pro</h2>
    <p>Upload image to edit colors or remove background</p>
    
    <input type="file" id="upload" accept="image/*">
    
    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div>
            <label>Brightness</label>
            <input type="range" id="brightness" min="0" max="200" value="100">
        </div>
        <div>
            <label>Saturation</label>
            <input type="range" id="saturation" min="0" max="200" value="100">
        </div>
        <div>
            <label>Contrast</label>
            <input type="range" id="contrast" min="0" max="200" value="100">
        </div>

        <button class="btn btn-bg" onclick="removeBackground()">Remove Background (AI)</button>
        <button class="btn" onclick="applyGrayscale()">Grayscale</button>
        <button class="btn" onclick="downloadImage()">Download PNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const brightness = document.getElementById('brightness');
    const saturation = document.getElementById('saturation');
    const contrast = document.getElementById('contrast');
    
    let originalImage = null;

    // 1. Upload & Draw Image
    upload.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                originalImage = img;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 2. Apply Filters (Brightness, Saturation, etc.)
    function applyFilters() {
        if (!originalImage) return;
        ctx.filter = `brightness(${brightness.value}%) saturate(${saturation.value}%) contrast(${contrast.value}%)`;
        ctx.drawImage(originalImage, 0, 0);
    }

    [brightness, saturation, contrast].forEach(input => {
        input.addEventListener('input', applyFilters);
    });

    // 3. Simple Grayscale Filter
    function applyGrayscale() {
        ctx.filter = 'grayscale(100%)';
        ctx.drawImage(originalImage, 0, 0);
    }

    // 4. Background Removal (Using a Free API)
    async function removeBackground() {
        if (!originalImage) return alert("Pehle photo select karein!");
        
        alert("Connecting to AI... Please wait.");
        
        const file = upload.files[0];
        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');

        // NOTE: Aapko 'remove.bg' ya 'Photoroom' ki API key use karni hogi.
        // Ye example remove.bg API ke liye hai:
        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': 'YOUR_API_KEY_HERE' }, // Yaha apni API key dalein
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    originalImage = img;
                };
                img.src = url;
            } else {
                alert("API Error: Key check karein ya free limit khatam ho sakti hai.");
            }
        } catch (err) {
            console.error(err);
        }
    }

    // 5. Download Function
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'edited-image.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
