<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BG Remover - Fixed</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .upload-box { border: 2px dashed #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #result { max-width: 100%; margin-top: 20px; display: none; border-radius: 10px; }
        #loader { display: none; margin: 10px 0; color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>BG Remover</h2>
    <div class="upload-box">
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <button id="btn">Remove Background</button>
    <div id="loader">Processing... Please wait</div>
    <img id="result" alt="Result">
    <br>
    <a id="download" style="display:none; margin-top:10px; color: green; font-weight:bold; text-decoration:none;">Download PNG</a>
</div>

<script>
    const API_KEY = "Jsw51tXES1zSGE3yta2Sbkhz"; 

    document.getElementById('btn').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return alert("Select an image!");

        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const resultImg = document.getElementById('result');
        const downloadLink = document.getElementById('download');

        btn.disabled = true;
        loader.style.display = "block";
        resultImg.style.display = "none";

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        try {
            // Hum direct API ki jagah ek proxy use kar rahe hain CORS error se bachne ke liye
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                resultImg.src = url;
                resultImg.style.display = "block";
                downloadLink.href = url;
                downloadLink.download = "no-bg.png";
                downloadLink.style.display = "inline-block";
            } else {
                const err = await response.json();
                alert("API Error: " + err.errors[0].title);
            }
        } catch (e) {
            alert("Network error! Try using a different browser or check internet.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    });
</script>

</body>
</html>
