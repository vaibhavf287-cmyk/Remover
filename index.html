<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean AI BG Remover</title>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1e293b; }
        .card { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 450px; text-align: center; }
        .upload-zone { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 1rem; margin: 1.5rem 0; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-zone:hover { border-color: var(--primary); background: #eff6ff; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 0.6rem; font-weight: 600; width: 100%; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { display: none; margin: 1rem 0; font-weight: 600; color: var(--primary); }
        #result-img { max-width: 100%; margin-top: 1.5rem; border-radius: 0.8rem; display: none; border: 1px solid #e2e8f0; background: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        .download-btn { display: none; margin-top: 1rem; background: #10b981; color: white; text-decoration: none; padding: 12px; border-radius: 0.6rem; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Clean BG Remover</h2>
    <p style="font-size: 0.9rem; color: #64748b;">No Watermark • No API Key • 100% Free</p>
    
    <div class="upload-zone">
        <span id="file-label">Tap to select photo</span>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <button id="processBtn">Remove Background</button>
    
    <div id="status">Starting AI Engine... ⚙️</div>
    
    <img id="result-img" alt="Result">
    <a id="downloadBtn" class="download-btn">Download High-Res PNG</a>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const resultImg = document.getElementById('result-img');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileLabel = document.getElementById('file-label');

    imageInput.onchange = () => {
        if(imageInput.files[0]) fileLabel.innerText = imageInput.files[0].name;
    };

    processBtn.onclick = async () => {
        const file = imageInput.files[0];
        if (!file) return alert("Pehle ek image select karein!");

        // UI Reset
        status.style.display = "block";
        processBtn.disabled = true;
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            // Processing locally in the browser
            // Pehli baar mein library AI model download karegi (approx 5-10MB)
            const blob = await imglyConfig.removeBackground(file, {
                progress: (step, current, total) => {
                    status.innerText = `Processing: ${Math.round((current/total)*100)}%`;
                }
            });

            const url = URL.createObjectURL(blob);
            resultImg.src = url;
            resultImg.style.display = "block";
            
            downloadBtn.href = url;
            downloadBtn.download = "clean_image.png";
            downloadBtn.style.display = "block";
            status.style.display = "none";
        } catch (error) {
            console.error(error);
            alert("Error: Processing fail ho gayi. Internet check karein.");
            status.style.display = "none";
        } finally {
            processBtn.disabled = false;
        }
    };
</script>

</body>
</html>
