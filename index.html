<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Editor - Text Behind Object</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; touch-action: none; }
        .container { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 450px; text-align: center; }
        .canvas-area { margin: 15px 0; border: 2px solid #ddd; position: relative; background: #eee; overflow: hidden; border-radius: 10px; }
        canvas { max-width: 100%; height: auto; cursor: move; display: block; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        input[type="text"], input[type="color"] { width: 90%; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
        .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); }
        .btn-ai { background: #ff4757; }
        .btn-save { background: #2ed573; }
        label { font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3>Vaibhav AI Editor</h3>
    <input type="file" id="upload" accept="image/*">
    
    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="userText" placeholder="Type something..." class="full">
        <div>
            <label>Text Color</label><br>
            <input type="color" id="textColor" value="#ffffff">
        </div>
        <div>
            <label>Text Size</label>
            <input type="range" id="textSize" min="20" max="200" value="60">
        </div>
        
        <button class="btn btn-ai full" onclick="processBehindText()">✨ Text Behind Human (AI)</button>
        <p style="font-size: 10px; grid-column: span 2;">Tip: Ungli se text ko move karein!</p>
        <button class="btn btn-save full" onclick="downloadImage()">Download PNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const userText = document.getElementById('userText');
    const textColor = document.getElementById('textColor');
    const textSize = document.getElementById('textSize');

    let mainImg = new Image();
    let noBgImg = new Image();
    let textX = 100, textY = 150;
    let isDragging = false;
    let hasNoBg = false;
    let apiKey = "ARDzmG85VhtFY1MbAW6X7ZYD";

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                textX = canvas.width / 2;
                textY = canvas.height / 2;
                render();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Pehle asli photo draw karo
        if (mainImg.src) ctx.drawImage(mainImg, 0, 0);

        // 2. Beech mein text likho
        ctx.font = `bold ${textSize.value}px Arial`;
        ctx.fillStyle = textColor.value;
        ctx.textAlign = "center";
        ctx.fillText(userText.value, textX, textY);

        // 3. Agar AI se BG remove ho chuka hai, toh wo upar chipkao
        if (hasNoBg) {
            ctx.drawImage(noBgImg, 0, 0);
        }
    }

    // Touch aur Mouse se move karne ka logic
    function move(e) {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        textX = (clientX - rect.left) * scaleX;
        textY = (clientY - rect.top) * scaleY;
        render();
    }

    canvas.onmousedown = canvas.ontouchstart = () => isDragging = true;
    window.onmouseup = window.ontouchend = () => isDragging = false;
    window.onmousemove = window.ontouchmove = move;
    
    // UI changes par live update
    [userText, textColor, textSize].forEach(el => el.oninput = render);

    async function processBehindText() {
        if (!upload.files[0]) return alert("Select Photo!");
        alert("AI processing... Isme 5-10 seconds lag sakte hain.");

        const formData = new FormData();
        formData.append('image_file', upload.files[0]);

        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST',
            headers: { 'X-Api-Key': apiKey },
            body: formData
        });

        if (res.ok) {
            const blob = await res.blob();
            noBgImg.src = URL.createObjectURL(blob);
            noBgImg.onload = () => {
                hasNoBg = true;
                render();
                alert("Magic Done! Ab text ko move karke dekho.");
            };
        } else {
            alert("API Error! Check key or balance.");
        }
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'vaibhav_magic.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
