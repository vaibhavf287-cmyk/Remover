<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Editor Pro - Vaibhav</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 500px; text-align: center; margin-top: 20px; }
        
        .canvas-area { 
            margin: 20px 0; 
            border: 2px dashed #cbd5e1; 
            border-radius: 12px; 
            background: #fafafa;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        canvas { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .full-width { grid-column: span 2; }
        
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        input[type="text"] { width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        
        .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; color: white; }
        .btn-bg { background: #ff4757; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: #2ed573; }
        .btn:active { transform: scale(0.95); }
        
        label { font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">AI Image Editor Pro</h2>
    <p style="font-size: 13px; color: #666;">Edit, Remove BG & Add Text</p>
    
    <input type="file" id="upload" accept="image/*" style="margin-bottom: 15px;">
    
    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>

    <input type="text" id="userText" placeholder="Enter text to add on image...">

    <div class="controls">
        <div>
            <label>Brightness</label>
            <input type="range" id="brightness" min="0" max="200" value="100">
        </div>
        <div>
            <label>Contrast</label>
            <input type="range" id="contrast" min="0" max="200" value="100">
        </div>

        <button class="btn btn-bg full-width" onclick="removeBackground()">✨ Remove Background (AI)</button>
        <button class="btn btn-blue" onclick="addTextToCanvas()">Add Text</button>
        <button class="btn btn-blue" onclick="applyGrayscale()">B&W Filter</button>
        <button class="btn btn-green full-width" onclick="downloadImage()">⬇️ Download Result</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const userText = document.getElementById('userText');
    
    let originalImage = null;
    let apiKey = "ARDzmG85VhtFY1MbAW6X7ZYD"; // Aapki key lagadi hai

    upload.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // Resize logic: Canvas ko image ke size ka banana
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                originalImage = img;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function applyFilters() {
        if (!originalImage) return;
        ctx.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%)`;
        ctx.drawImage(originalImage, 0, 0);
    }

    [brightness, contrast].forEach(input => input.addEventListener('input', applyFilters));

    function applyGrayscale() {
        if (!originalImage) return;
        ctx.filter = 'grayscale(100%)';
        ctx.drawImage(originalImage, 0, 0);
    }

    function addTextToCanvas() {
        if (!originalImage) return;
        const text = userText.value;
        ctx.font = "bold 50px Arial";
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 10;
        ctx.fillText(text, canvas.width / 2, canvas.height - 50);
        ctx.shadowBlur = 0; 
    }

    async function removeBackground() {
        if (!upload.files[0]) return alert("Please select a file first!");
        
        alert("Processing... AI background remove kar raha hai.");
        
        const formData = new FormData();
        formData.append('image_file', upload.files[0]);
        formData.append('size', 'auto');

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': apiKey },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    originalImage = img; // Update original to the new BG-less image
                    alert("Done!");
                };
                img.src = url;
            } else {
                alert("Error: API limit khatam ya key galat hai.");
            }
        } catch (err) {
            console.error(err);
        }
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'vaibhav_editor_output.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
