<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover</title>
    <style>
        :root { --primary: #e11d48; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 1rem; }
        .input-group { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 0.5rem; margin-bottom: 1.5rem; cursor: pointer; position: relative; }
        .input-group:hover { border-color: var(--primary); }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 0.5rem; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        button:hover { background: #be123c; }
        button:disabled { background: #fda4af; cursor: not-allowed; }
        #loader { display: none; margin: 1rem 0; color: var(--primary); font-weight: bold; }
        #result-img { max-width: 100%; margin-top: 1.5rem; border-radius: 0.5rem; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .download-btn { display: none; margin-top: 1rem; color: #2563eb; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>BG Remover Tool</h2>
    <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem;">Powered by Remove.bg API</p>
    
    <div class="input-group">
        <span id="file-name">Click to upload image</span>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="uploadBtn">Remove Background</button>
    
    <div id="loader">Processing your image... ⌛</div>
    
    <img id="result-img" alt="Background Removed">
    <a id="downloadLink" class="download-btn" download="no-bg.png">Download Result</a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultImg = document.getElementById('result-img');
    const downloadLink = document.getElementById('downloadLink');
    const loader = document.getElementById('loader');
    const fileNameDisplay = document.getElementById('file-name');

    // Aapki API Key yahan hai
    const API_KEY = "Jsw51tXES1zSGE3yta2Sbkhz"; 

    fileInput.addEventListener('change', () => {
        if(fileInput.files[0]) fileNameDisplay.innerText = fileInput.files[0].name;
    });

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Pehle ek image select karein!");

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        loader.style.display = "block";
        uploadBtn.disabled = true;
        resultImg.style.display = "none";
        downloadLink.style.display = "none";

        try {
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultImg.src = url;
                resultImg.style.display = "block";
                
                downloadLink.href = url;
                downloadLink.style.display = "block";
                downloadLink.innerText = "⬇️ Download Clean Image";
            } else {
                const errorData = await response.json();
                alert("Error: " + errorData.errors[0].title);
            }
        } catch (error) {
            alert("Network error! Check your connection.");
        } finally {
            loader.style.display = "none";
            uploadBtn.disabled = false;
        }
    });
</script>

</body>
</html>
