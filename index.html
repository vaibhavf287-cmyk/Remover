<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI BG Remover</title>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        .upload-section { border: 2px dashed #007bff; padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; cursor: pointer; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        button { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { display: none; margin: 15px 0; color: #555; font-size: 14px; }
        #resultImg { max-width: 100%; margin-top: 20px; display: none; border: 1px solid #ddd; border-radius: 10px; background: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        .download-btn { display: none; margin-top: 15px; background: #28a745; color: white; text-decoration: none; padding: 10px; display: inline-block; width: 95%; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI BG Remover (FREE)</h2>
    <p>Koi API key ki zaroorat nahi hai!</p>
    
    <div class="upload-section" id="dropZone">
        <p id="fileName">Photo select karein ya yahan drop karein</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="processBtn">Background Hatayein</button>
    
    <div id="status">AI Model load ho raha hai... (Pehli baar mein 10-15 seconds lag sakte hain)</div>
    
    <img id="resultImg" alt="Result">
    <a id="downloadBtn" class="download-btn" download="no-bg.png">Download Karein</a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileName = document.getElementById('fileName');

    fileInput.addEventListener('change', () => {
        if(fileInput.files[0]) fileName.innerText = fileInput.files[0].name;
    });

    processBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Pehle photo select karein!");

        // UI Updates
        processBtn.disabled = true;
        status.style.display = "block";
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            // Processing using WASM (No Server/API involved)
            const config = {
                progress: (step, current, total) => {
                    status.innerText = `Processing: ${Math.round((current/total)*100)}%`;
                }
            };

            const blob = await imglyConfig.removeBackground(file, config);
            const url = URL.createObjectURL(blob);

            resultImg.src = url;
            resultImg.style.display = "block";
            downloadBtn.href = url;
            downloadBtn.style.display = "block";
            status.style.display = "none";
        } catch (error) {
            console.error(error);
            alert("Error: AI process fail ho gaya. Internet check karein.");
            status.style.display = "none";
        } finally {
            processBtn.disabled = false;
        }
    });
</script>

</body>
</html>
