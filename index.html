<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover - Fixed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .upload-area { border: 2px dashed #d1d5db; padding: 20px; border-radius: 0.5rem; margin-bottom: 20px; cursor: pointer; }
        button { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; }
        #output { max-width: 100%; margin-top: 20px; display: none; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        #loader { display: none; margin: 15px 0; color: #2563eb; font-weight: 600; }
        .download-link { display: none; margin-top: 15px; color: #059669; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI BG Remover</h2>
    <p style="font-size: 0.8rem; color: #6b7280;">Upload an image to remove background</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="processBtn">Remove Background</button>
    <div id="loader">Processing... ⌛</div>
    
    <img id="output" alt="Result">
    <a id="downloadBtn" class="download-link" download="bg-removed.png">Download PNG</a>
</div>

<script>
    // Aapki API Key
    const API_KEY = "Jsw51tXES1zSGE3yta2Sbkhz"; 

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loader = document.getElementById('loader');
    const outputImg = document.getElementById('output');
    const downloadBtn = document.getElementById('downloadBtn');

    processBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Please select an image first!");

        // UI Reset
        loader.style.display = "block";
        processBtn.disabled = true;
        outputImg.style.display = "none";
        downloadBtn.style.display = "none";

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        try {
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: {
                    "X-Api-Key": API_KEY
                },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                outputImg.src = url;
                outputImg.style.display = "block";
                
                downloadBtn.href = url;
                downloadBtn.style.display = "block";
                downloadBtn.innerText = "Download Clean Image";
            } else {
                const errorData = await response.json();
                console.error("API Error Details:", errorData);
                alert("Error: " + (errorData.errors[0]?.title || "Failed to process image"));
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Network Error: Make sure you are using a live URL (GitHub Pages) and not opening the file locally.");
        } finally {
            loader.style.display = "none";
            processBtn.disabled = false;
        }
    });
</script>

</body>
</html>
